name: ezcharge
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # --- State Management & Logic ---
  get: ^4.7.3
  provider: ^6.1.5+1

  # --- Firebase & Backend ---
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  google_sign_in: ^7.2.0

  # --- Maps & Location ---
  google_maps_flutter: ^2.17.0
  flutter_polyline_points: ^3.1.0
  geolocator: ^14.0.2
  location: ^8.0.1

  # --- AI & Camera & Scanning ---
  camera: ^0.12.0+1
  mobile_scanner: ^7.2.0
  google_mlkit_face_detection: ^0.13.2
  image_picker: ^1.2.1
  qr_flutter: ^4.1.0

  # --- UI Components & Styling ---
  google_fonts: ^8.0.2
  carousel_slider: ^5.1.2
  fl_chart: ^1.2.0
  pinput: ^6.0.2
  dash_chat_2: ^0.0.21
  cached_network_image: ^3.4.1 # Avoid 'any'

  # --- Utilities & Helpers ---
  intl: ^0.19.0
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  flutter_dotenv: ^5.2.1
  file_picker: ^11.0.2
  http: ^1.3.0 # Avoid 'any'
  path: ^1.9.1 # Avoid 'any'
  chat_gpt_sdk: ^3.1.5

  # --- PDF & Printing ---
  pdf: ^3.12.0
  printing: ^5.14.3
  logger: ^2.7.0
  intl_phone_number_input: ^0.7.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf

flutter_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/images/ezcharge_logo.png"